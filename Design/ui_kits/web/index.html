<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EyesTalk · Web UI Kit</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--fg-1);font-family:'Inter',system-ui,sans-serif}
  *{box-sizing:border-box}
  @keyframes etPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }
  /* page chrome */
  .pageHead{padding:36px 32px 8px;text-align:center}
  .pageHead h1{margin:0 0 6px;font-size:24px;font-weight:800;letter-spacing:-0.5px}
  .pageHead p{margin:0;font-size:13px;color:var(--fg-3);max-width:620px;margin:0 auto;line-height:1.5}
  .tabs{display:flex;justify-content:center;gap:6px;padding:18px 0 24px;flex-wrap:wrap}
  .tab{font-size:12px;padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--fg-2);cursor:pointer;font-weight:500}
  .tab.on{background:rgba(124,111,247,0.15);border-color:rgba(124,111,247,0.4);color:var(--accent-light)}
  .frame{max-width:1280px;margin:0 auto 60px;background:var(--bg-primary);border:1px solid rgba(255,255,255,0.08);border-radius:18px;overflow:hidden;display:flex;height:820px;box-shadow:0 30px 90px rgba(0,0,0,0.4)}
  .label{text-align:center;font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:1.6px;margin:-44px 0 28px;font-weight:600}
  /* inner main scroll */
  .main{flex:1;overflow-y:auto}
</style>
</head>
<body>

<div class="pageHead">
  <h1>EyesTalk · Venue Owner Panel</h1>
  <p>Recreated from <code style="font-family:ui-monospace,monospace;color:var(--accent-light)">apps/web/app/(venue-panel)/dashboard</code>. Click sidebar items to switch screens. The frame below is sized like a real desktop window — try the tabs to compare each screen statically.</p>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [active, setActive] = useState('dashboard');
  const screen = (() => {
    switch(active){
      case 'live-screen': return <WebLiveScreen/>;
      case 'analytics':   return <WebAnalytics/>;
      case 'activities':  return <WebActivities/>;
      case 'qr-codes':    return <WebQrCodes/>;
      default:            return <WebDashboard/>;
    }
  })();
  return (
    <>
      <div className="frame" data-screen-label={`Web · ${active}`}>
        <WebSidebar active={active} onChange={setActive} venueName="Stardust Lounge"/>
        <div className="main">{screen}</div>
      </div>
    </>
  );
}

const tries = setInterval(() => {
  if (window.WebSidebar && window.WebDashboard) {
    clearInterval(tries);
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  }
}, 50);
</script>

</body>
</html>
