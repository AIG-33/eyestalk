<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Brand accents · neon on midnight</div>
  <div class="row">
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);box-shadow:0 0 15px rgba(124,111,247,0.4),0 0 30px rgba(124,111,247,0.15)"></div>
      <div style="font-size:11px;font-weight:600">primary</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#7C6FF7</div>
    </div>
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:#00E5A0;box-shadow:0 0 12px rgba(0,229,160,0.4)"></div>
      <div style="font-size:11px;font-weight:600">success</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#00E5A0</div>
    </div>
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:#FF6B9D;box-shadow:0 0 12px rgba(255,107,157,0.4)"></div>
      <div style="font-size:11px;font-weight:600">pink</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#FF6B9D</div>
    </div>
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:#FFD93D;box-shadow:0 0 10px rgba(255,217,61,0.3)"></div>
      <div style="font-size:11px;font-weight:600">warning</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#FFD93D</div>
    </div>
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:#FF4757;box-shadow:0 0 12px rgba(255,71,87,0.4)"></div>
      <div style="font-size:11px;font-weight:600">error</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#FF4757</div>
    </div>
    <div class="col" style="gap:6px">
      <div style="width:72px;height:72px;border-radius:18px;background:#00D4FF;box-shadow:0 0 10px rgba(0,212,255,0.3)"></div>
      <div style="font-size:11px;font-weight:600">info</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#00D4FF</div>
    </div>
  </div>
</body></html>
