<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Avatars · ring states</div>
  <div class="row" style="gap:18px;align-items:flex-end">
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:60px;height:60px;border-radius:9999px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);display:grid;place-items:center;color:#fff;font-weight:700;font-family:'Clash Display',Inter,sans-serif">M</div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">default</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:60px;height:60px;border-radius:9999px;padding:2px;background:linear-gradient(135deg,#7C6FF7,#A29BFE)">
        <div style="width:100%;height:100%;border-radius:9999px;background:#FF6B9D;display:grid;place-items:center;color:#fff;font-weight:700;border:2px solid #0D0D1A">A</div>
      </div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">checked-in</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="position:relative;width:60px;height:60px">
        <div style="width:60px;height:60px;border-radius:9999px;background:linear-gradient(135deg,#FFD93D,#FF6B9D);display:grid;place-items:center;color:#0D0D1A;font-weight:700">J</div>
        <div style="position:absolute;right:-2px;bottom:-2px;width:16px;height:16px;border-radius:9999px;background:#00E5A0;border:3px solid #0D0D1A;box-shadow:0 0 8px rgba(0,229,160,0.7)"></div>
      </div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">online</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:60px;height:60px;border-radius:9999px;background:#2A2A5A;display:grid;place-items:center;color:#5A5A78;font-weight:700">?</div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">away</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:40px;height:40px;border-radius:9999px;background:linear-gradient(135deg,#00E5A0,#00D4FF);display:grid;place-items:center;color:#0D0D1A;font-weight:700;font-size:13px">L</div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">sm 40</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:80px;height:80px;border-radius:9999px;background:linear-gradient(135deg,#FF6B9D,#7C6FF7);display:grid;place-items:center;color:#fff;font-weight:700;font-size:24px;font-family:'Clash Display',Inter,sans-serif">R</div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">lg 80</span>
    </div>
  </div>
</body></html>
