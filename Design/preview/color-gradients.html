<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Brand gradients · always 135°</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
    <div>
      <div style="height:88px;border-radius:14px;background:linear-gradient(135deg,#7C6FF7,#A29BFE)"></div>
      <div style="font-size:11px;font-weight:600;margin-top:8px">gradient-primary</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#7C6FF7 → #A29BFE</div>
    </div>
    <div>
      <div style="height:88px;border-radius:14px;background:linear-gradient(135deg,#FF6B9D,#7C6FF7)"></div>
      <div style="font-size:11px;font-weight:600;margin-top:8px">gradient-match</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#FF6B9D → #7C6FF7</div>
    </div>
    <div>
      <div style="height:88px;border-radius:14px;background:linear-gradient(135deg,#FFD93D,#FF6B9D)"></div>
      <div style="font-size:11px;font-weight:600;margin-top:8px">gradient-premium</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#FFD93D → #FF6B9D</div>
    </div>
  </div>
</body></html>
