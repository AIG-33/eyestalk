<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Backgrounds · dark ramp</div>
  <div class="row" style="gap:0;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)">
    <div style="flex:1;height:104px;background:#0D0D1A;display:flex;flex-direction:column;justify-content:flex-end;padding:10px">
      <div style="font-size:11px;font-weight:600">bg-primary</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#0D0D1A</div>
    </div>
    <div style="flex:1;height:104px;background:#161630;display:flex;flex-direction:column;justify-content:flex-end;padding:10px">
      <div style="font-size:11px;font-weight:600">bg-secondary</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#161630</div>
    </div>
    <div style="flex:1;height:104px;background:#1E1E3F;display:flex;flex-direction:column;justify-content:flex-end;padding:10px">
      <div style="font-size:11px;font-weight:600">bg-tertiary</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#1E1E3F</div>
    </div>
    <div style="flex:1;height:104px;background:#2A2A5A;display:flex;flex-direction:column;justify-content:flex-end;padding:10px">
      <div style="font-size:11px;font-weight:600">bg-surface</div>
      <div class="mono" style="font-size:10px;color:#A0A0B8">#2A2A5A</div>
    </div>
  </div>
