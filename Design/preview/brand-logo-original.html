<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div style="background:#0D0D1A;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px;display:flex;align-items:center;justify-content:center;min-height:160px">
    <img src="../assets/logo-original-purple.png" alt="logo purple" style="max-height:120px;max-width:80%;object-fit:contain">
  </div>
  <div style="background:#F5F5FA;border:1px solid rgba(0,0,0,0.06);border-radius:14px;padding:18px;display:flex;align-items:center;justify-content:center;min-height:160px">
    <img src="../assets/logo-original-light.png" alt="logo light" style="max-height:120px;max-width:80%;object-fit:contain">
  </div>
  <div class="mono" style="grid-column:1/-1;font-size:10px;color:#5A5A78">Original mark — speech bubble + dual-eye glasses. PNG only; redesign in next card.</div>
</body></html>
