<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Eyebrow + accent · uppercase + Space Grotesk</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="padding:16px;background:#161630;border:1px solid rgba(255,255,255,0.06);border-radius:14px">
      <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#5A5A78">Currently checked in</div>
      <div style="font-family:'Clash Display',Inter,sans-serif;font-weight:800;font-size:24px;color:#E8E8F0;margin-top:6px;letter-spacing:-0.4px">Stardust Lounge</div>
      <div class="mono" style="font-size:10px;color:#5A5A78;margin-top:8px">eyebrow · 11/600 · tracking 1.5px</div>
    </div>
    <div style="padding:16px;background:#161630;border:1px solid rgba(255,255,255,0.06);border-radius:14px">
      <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#5A5A78">Your balance</div>
      <div style="font-family:'Space Grotesk',Inter,sans-serif;font-weight:600;font-size:28px;color:#FFD93D;margin-top:4px;letter-spacing:-0.5px">🪙 1,250</div>
      <div class="mono" style="font-size:10px;color:#5A5A78;margin-top:8px">accent · Space Grotesk for numerics</div>
    </div>
  </div>
</body></html>
