<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Tab bar · 88h with active glow dot</div>
  <div style="margin-top:8px;height:96px;background:#0D0D1A;border:1px solid rgba(255,255,255,0.06);border-radius:24px 24px 14px 14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-around;position:relative;overflow:hidden">
    <div style="position:absolute;inset:auto 0 -40px 0;height:60px;background:radial-gradient(40% 100% at 20% 100%,rgba(124,111,247,0.18),transparent 70%)"></div>
    <div class="col" style="align-items:center;gap:6px;color:#A29BFE;position:relative">
      <span style="font-size:32px;line-height:1">🗺️</span>
      <span style="font-size:12px;font-weight:600">Map</span>
      <div style="position:absolute;bottom:-10px;width:5px;height:5px;border-radius:9999px;background:#A29BFE;box-shadow:0 0 10px #A29BFE"></div>
    </div>
    <div class="col" style="align-items:center;gap:6px;color:#5A5A78;opacity:.8"><span style="font-size:30px;line-height:1">💬</span><span style="font-size:12px;font-weight:500">Chats</span></div>
    <div class="col" style="align-items:center;gap:6px;color:#5A5A78;opacity:.8"><span style="font-size:30px;line-height:1">🪙</span><span style="font-size:12px;font-weight:500">Tokens</span></div>
    <div class="col" style="align-items:center;gap:6px;color:#5A5A78;opacity:.8"><span style="font-size:30px;line-height:1">👤</span><span style="font-size:12px;font-weight:500">Profile</span></div>
  </div>
</body></html>
