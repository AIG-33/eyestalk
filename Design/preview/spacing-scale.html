<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Spacing scale · 2 / 4 / 8 / 12 / 16 / 20 / 24 / 32 / 48</div>
  <div style="display:flex;align-items:flex-end;gap:14px;height:80px">
    <div class="col" style="gap:4px;align-items:center"><div style="width:2px;height:24px;background:#7C6FF7;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">2</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:4px;height:24px;background:#7C6FF7;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">4</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:8px;height:24px;background:#7C6FF7;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">8</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:12px;height:24px;background:#7C6FF7;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">12</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:16px;height:24px;background:#7C6FF7;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">16</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:20px;height:24px;background:#A29BFE;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">20</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:24px;height:24px;background:#A29BFE;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">24</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:32px;height:24px;background:#A29BFE;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">32</span></div>
    <div class="col" style="gap:4px;align-items:center"><div style="width:48px;height:24px;background:#A29BFE;border-radius:2px"></div><span class="mono" style="font-size:10px;color:#A0A0B8">48</span></div>
  </div>
  <div style="font-size:11px;color:#A0A0B8;margin-top:6px">Page padding is almost always <b style="color:#E8E8F0">xl=20</b>; section gap <b style="color:#E8E8F0">lg=16 → 2xl=24</b>.</div>
</body></html>
