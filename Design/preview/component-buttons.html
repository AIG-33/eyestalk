<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Buttons · primary / secondary / ghost</div>
  <div class="row" style="gap:12px">
    <button style="border:0;height:56px;padding:0 24px;border-radius:16px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);color:#fff;font-family:Inter,sans-serif;font-weight:600;font-size:15px;box-shadow:0 0 15px rgba(124,111,247,0.4),0 0 30px rgba(124,111,247,0.15);cursor:pointer">Check In</button>
    <button style="height:56px;padding:0 22px;border-radius:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);color:#E8E8F0;font-family:Inter,sans-serif;font-weight:600;font-size:15px;cursor:pointer">Send a wave</button>
    <button style="height:56px;padding:0 18px;border-radius:16px;background:transparent;border:0;color:#A29BFE;font-family:Inter,sans-serif;font-weight:600;font-size:15px;cursor:pointer">Skip for now</button>
    <button style="height:48px;width:48px;border:0;border-radius:9999px;background:linear-gradient(135deg,#FF6B9D,#7C6FF7);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 0 15px rgba(255,107,157,0.4)">＋</button>
  </div>
  <div style="font-size:11px;color:#A0A0B8;margin-top:4px">Primary 56h · radius 16 · 600 weight · gradient + glow. Press = activeOpacity 0.8 (no scale).</div>
</body></html>
