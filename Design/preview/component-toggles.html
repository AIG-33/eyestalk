<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Switches & segmented · standard motion 250ms</div>
  <div class="row" style="gap:24px">
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:52px;height:30px;border-radius:9999px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);position:relative;box-shadow:0 0 12px rgba(124,111,247,0.4)"><div style="position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:9999px;background:#fff"></div></div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">on</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:52px;height:30px;border-radius:9999px;background:#2A2A5A;position:relative"><div style="position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:9999px;background:#A0A0B8"></div></div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">off</span>
    </div>
    <div style="display:flex;background:#161630;border-radius:9999px;padding:4px;border:1px solid rgba(255,255,255,0.06)">
      <button style="border:0;height:36px;padding:0 18px;border-radius:9999px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);color:#fff;font-size:12px;font-weight:600;cursor:pointer">Map</button>
      <button style="border:0;height:36px;padding:0 18px;border-radius:9999px;background:transparent;color:#A0A0B8;font-size:12px;font-weight:500;cursor:pointer">List</button>
    </div>
  </div>
</body></html>
