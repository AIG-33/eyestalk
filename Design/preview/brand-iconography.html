<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Iconography · Ionicons + venue-type emoji</div>
  <div class="row" style="gap:12px;font-size:22px">
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">🗺️</span>
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">💬</span>
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">👤</span>
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">🪙</span>
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">⚙️</span>
    <span style="width:40px;height:40px;border-radius:10px;background:#161630;border:1px solid rgba(255,255,255,0.06);display:grid;place-items:center">📍</span>
  </div>
  <div class="row" style="gap:12px;font-size:22px;margin-top:6px">
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🪩</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🎤</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">⚽</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🎳</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🎱</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">💨</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🎲</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🕹️</span>
    <span style="width:40px;height:40px;border-radius:10px;background:rgba(124,111,247,0.12);display:grid;place-items:center">🎵</span>
  </div>
  <div style="font-size:11px;color:#A0A0B8;margin-top:4px">Top: Ionicons (outline default / filled active). Bottom: venue-type emoji from <span class="mono">venue-constants.ts</span> — these <em>are</em> the icons.</div>
</body></html>
