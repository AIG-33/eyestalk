<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Inputs · default / focus / error</div>
  <div class="col" style="gap:10px;max-width:480px">
    <div style="height:52px;padding:0 16px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;color:#5A5A78;font-size:14px">Display name</div>
    <div style="height:52px;padding:0 16px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid #7C6FF7;display:flex;align-items:center;color:#E8E8F0;font-size:14px;box-shadow:0 0 15px rgba(124,111,247,0.4),0 0 30px rgba(124,111,247,0.15)">Stardust<span style="display:inline-block;width:1px;height:18px;background:#A29BFE;margin-left:1px;animation:b 1s infinite"></span></div>
    <div style="height:52px;padding:0 16px;border-radius:14px;background:rgba(255,71,87,0.06);border:1px solid #FF4757;display:flex;align-items:center;color:#FF4757;font-size:14px">!&nbsp;&nbsp;Username already taken</div>
  </div>
  <style>@keyframes b{50%{opacity:0}}</style>
</body></html>
