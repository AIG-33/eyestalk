<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="background:#0D0D1A">
  <div class="eyebrow">Glass card · over the map</div>
  <div style="position:relative;border-radius:20px;overflow:hidden;height:200px;background:radial-gradient(80% 70% at 30% 20%,rgba(124,111,247,0.25),transparent 60%),radial-gradient(70% 60% at 80% 80%,rgba(255,107,157,0.18),transparent 60%),#0D0D1A">
    <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:88%;padding:18px;border-radius:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08)">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:9999px;background:linear-gradient(135deg,#FF6B9D,#7C6FF7);display:grid;place-items:center;color:#fff;font-weight:700">SL</div>
        <div style="flex:1">
          <div style="font-family:'Clash Display',Inter,sans-serif;font-weight:700;font-size:16px;color:#E8E8F0">Stardust Lounge</div>
          <div style="font-size:11px;color:#A0A0B8;margin-top:2px">🪩 Nightclub · 0.2 mi · 47 here now</div>
        </div>
        <div style="width:8px;height:8px;border-radius:9999px;background:#00E5A0;box-shadow:0 0 8px rgba(0,229,160,0.7)"></div>
      </div>
    </div>
  </div>
</body></html>
