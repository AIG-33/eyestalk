<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="background:#0D0D1A">
  <div class="eyebrow">Venue markers · emoji-as-icon</div>
  <div class="row" style="gap:18px;align-items:flex-end;padding:8px 0">
    <div class="col" style="align-items:center;gap:6px"><div style="width:48px;height:48px;border-radius:9999px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);display:grid;place-items:center;font-size:22px;box-shadow:0 0 18px rgba(124,111,247,0.55)">🪩</div><span class="mono" style="font-size:10px;color:#A0A0B8">nightclub</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:48px;height:48px;border-radius:9999px;background:linear-gradient(135deg,#FF6B9D,#FFD93D);display:grid;place-items:center;font-size:22px;box-shadow:0 0 18px rgba(255,107,157,0.5)">🎤</div><span class="mono" style="font-size:10px;color:#A0A0B8">karaoke</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:48px;height:48px;border-radius:9999px;background:linear-gradient(135deg,#00E5A0,#00D4FF);display:grid;place-items:center;font-size:22px;box-shadow:0 0 18px rgba(0,229,160,0.5)">⚽</div><span class="mono" style="font-size:10px;color:#A0A0B8">sports_bar</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:48px;height:48px;border-radius:9999px;background:linear-gradient(135deg,#1E1E3F,#2A2A5A);display:grid;place-items:center;font-size:22px;border:1px solid rgba(255,255,255,0.12)">🎱</div><span class="mono" style="font-size:10px;color:#A0A0B8">billiards</span></div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="position:relative;width:48px;height:48px"><div style="width:48px;height:48px;border-radius:9999px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);display:grid;place-items:center;font-size:22px;box-shadow:0 0 18px rgba(124,111,247,0.55)">🎳</div><div style="position:absolute;top:-2px;right:-2px;background:#FF4757;color:#fff;font-size:10px;font-weight:700;border-radius:9999px;padding:2px 6px;border:2px solid #0D0D1A">23</div></div>
      <span class="mono" style="font-size:10px;color:#A0A0B8">+ count</span>
    </div>
  </div>
</body></html>
