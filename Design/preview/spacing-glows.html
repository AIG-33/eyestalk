<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="eyebrow">Colored glows · double-stop neon halos</div>
  <div class="row" style="gap:28px;padding:18px 8px">
    <div class="col" style="gap:10px;align-items:center"><div style="width:64px;height:64px;background:linear-gradient(135deg,#7C6FF7,#A29BFE);border-radius:16px;box-shadow:0 0 15px rgba(124,111,247,0.4),0 0 30px rgba(124,111,247,0.15)"></div><span class="mono" style="font-size:10px;color:#A0A0B8">primary</span></div>
    <div class="col" style="gap:10px;align-items:center"><div style="width:64px;height:64px;background:#00E5A0;border-radius:16px;box-shadow:0 0 15px rgba(0,229,160,0.4),0 0 30px rgba(0,229,160,0.15)"></div><span class="mono" style="font-size:10px;color:#A0A0B8">success</span></div>
    <div class="col" style="gap:10px;align-items:center"><div style="width:64px;height:64px;background:#FF6B9D;border-radius:16px;box-shadow:0 0 15px rgba(255,107,157,0.4),0 0 30px rgba(255,107,157,0.15)"></div><span class="mono" style="font-size:10px;color:#A0A0B8">pink</span></div>
    <div class="col" style="gap:10px;align-items:center"><div style="width:64px;height:64px;background:#FFD93D;border-radius:16px;box-shadow:0 0 12px rgba(255,217,61,0.4),0 0 24px rgba(255,217,61,0.15)"></div><span class="mono" style="font-size:10px;color:#A0A0B8">warning</span></div>
    <div class="col" style="gap:10px;align-items:center"><div style="width:64px;height:64px;background:#FF4757;border-radius:16px;box-shadow:0 0 15px rgba(255,71,87,0.4),0 0 30px rgba(255,71,87,0.15)"></div><span class="mono" style="font-size:10px;color:#A0A0B8">error</span></div>
  </div>
  <div style="font-size:11px;color:#A0A0B8">Tight inner halo (15px) + soft outer wash (30px). Applied to primary buttons, status dots, focused inputs, FAB.</div>
</body></html>
